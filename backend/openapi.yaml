openapi: 3.0.3
info:
  title: CliniData Backend API
  version: 1.0.0
  description: API de CliniData para autenticación, usuarios, pacientes, consultas, adjuntos y auditoría. Seguridad por JWT Bearer.
servers:
  - url: http://localhost:3000
    description: Local development
tags:
  - name: health
  - name: auth
  - name: users
  - name: patients
  - name: consultas
  - name: attachments
  - name: dashboard
  - name: auditorias

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  uptime: { type: number }

  /api/auth/register:
    post:
      tags: [auth]
      summary: Registrar nuevo usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegister'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400': { description: Email ya registrado }

  /api/auth/login:
    post:
      tags: [auth]
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Token JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401': { description: Credenciales inválidas }

  /api/users/me:
    get:
      tags: [users]
      summary: Perfil del usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/users:
    get:
      tags: [users]
      summary: Listar usuarios (ADMIN)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      tags: [users]
      summary: Crear usuario (ADMIN)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegister'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/users/{id}/status:
    patch:
      tags: [users]
      summary: Activar/desactivar usuario (ADMIN)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                activo: { type: boolean }
      responses:
        '200': { description: Estado actualizado }
        '404': { description: Not found }

  /api/patients:
    get:
      tags: [patients]
      summary: Listar pacientes (MEDICO)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: Lista de pacientes paginada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Patient'
                  meta:
                    type: object
                    properties:
                      total: { type: integer }
                      page: { type: integer }
                      limit: { type: integer }
                      totalPages: { type: integer }
    post:
      tags: [patients]
      summary: Crear paciente (MEDICO)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreate'
      responses:
        '201':
          description: Paciente creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'

  /api/patients/{id}:
    get:
      tags: [patients]
      summary: Obtener paciente por id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Paciente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '404': { description: Not found }
    put:
      tags: [patients]
      summary: Actualizar paciente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientUpdate'
      responses:
        '200':
          description: Paciente actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
    patch:
      tags: [patients]
      summary: Actualización parcial de paciente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientUpdate'
      responses:
        '200':
          description: Paciente actualizado
    delete:
      tags: [patients]
      summary: Eliminar paciente (ADMIN)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: No Content }
        '404': { description: Not found }

  /api/consultas:
    post:
      tags: [consultas]
      summary: Crear consulta
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultaCreate'
      responses:
        '201':
          description: Consulta creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consulta'

  /api/consultas/paciente/{pacienteId}:
    get:
      tags: [consultas]
      summary: Historial de consultas de un paciente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: pacienteId
          required: true
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        '200':
          description: Lista de consultas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Consulta'

  /api/consultas/{id}/colaboradores:
    post:
      tags: [consultas]
      summary: Agregar colaborador a consulta
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                medicoId: { type: string }
      responses:
        '201': { description: Colaborador agregado }
        '404': { description: Not found }

  /api/consultas/{id}/notas:
    post:
      tags: [consultas]
      summary: Agregar nota clínica a consulta
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotaCreate'
      responses:
        '201': { description: Nota creada }

  /api/consultas/{id}/attachments:
    get:
      tags: [attachments]
      summary: Listar adjuntos de una consulta
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Lista de adjuntos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
    post:
      tags: [attachments]
      summary: Subir adjunto a consulta
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Adjunto subido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentCreateResponse'

  /api/consultas/{id}/attachments/{attachmentId}:
    delete:
      tags: [attachments]
      summary: Eliminar adjunto
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: attachmentId
          required: true
          schema: { type: string }
      responses:
        '204': { description: No Content }
        '404': { description: Not found }

  /api/dashboard:
    get:
      tags: [dashboard]
      summary: Estadísticas (ADMIN o MEDICO)
      security:
        - bearerAuth: []
      responses:
        '200': { description: Stats object }

  /api/auditorias:
    get:
      tags: [auditorias]
      summary: Listar auditorías (ADMIN)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista auditorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Auditoria'

  /api/appointments:
    get:
      tags: [consultas]
      summary: Listar citas (filtros opcionales por fecha)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: until
          schema: { type: string, format: date-time }
        - in: query
          name: pacienteId
          schema: { type: string }
      responses:
        '200':
          description: Lista de citas del médico autenticado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cita'
    post:
      tags: [consultas]
      summary: Crear cita
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CitaCreate'
      responses:
        '201':
          description: Cita creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cita'

  /api/appointments/{id}:
    get:
      tags: [consultas]
      summary: Obtener cita por id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Cita
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cita'
        '404': { description: Not found }
    put:
      tags: [consultas]
      summary: Actualizar cita
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CitaUpdate'
      responses:
        '200':
          description: Cita actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cita'
    delete:
      tags: [consultas]
      summary: Eliminar cita
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: No Content }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthRegister:
      type: object
      required: [email, password, nombre, apellido]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        rol:
          type: string
          enum: [ADMIN, MEDICO]
    AuthResponse:
      type: object
      properties:
        token:
          type: string
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        nombre: { type: string }
        apellido: { type: string }
        rol:
          type: string
          enum: [ADMIN, MEDICO]
        activo: { type: boolean }
        clinicaId: { type: string }
    Patient:
      type: object
      properties:
        id: { type: string }
        nombre: { type: string }
        apellido: { type: string }
        documentoIdentidad: { type: string }
        fechaNacimiento:
          type: string
          format: date
          nullable: true
        genero:
          type: string
          enum: [MASCULINO, FEMENINO, OTRO]
          nullable: true
        telefono:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        contactoEmergencia:
          type: string
          nullable: true
        telefonoEmergencia:
          type: string
          nullable: true
        nombreTutor:
          type: string
          nullable: true
        dniTutor:
          type: string
          nullable: true
        clinicaId: { type: string }
        medicoPrincipalId: { type: string }
        creadoEn:
          type: string
          format: date-time
    PatientCreate:
      type: object
      required: [nombre, apellido, documentoIdentidad]
      properties:
        nombre: { type: string }
        apellido: { type: string }
        documentoIdentidad: { type: string }
        fechaNacimiento:
          type: string
          format: date
        genero:
          type: string
          enum: [MASCULINO, FEMENINO, OTRO]
        telefono: { type: string }
        email: { type: string }
        contactoEmergencia: { type: string }
        telefonoEmergencia: { type: string }
        nombreTutor: { type: string }
        dniTutor: { type: string }
    PatientUpdate:
      type: object
      properties:
        nombre: { type: string }
        apellido: { type: string }
        documentoIdentidad: { type: string }
        fechaNacimiento:
          type: string
          format: date
          nullable: true
        genero:
          type: string
          enum: [MASCULINO, FEMENINO, OTRO]
          nullable: true
        telefono: { type: string }
        email: { type: string }
        contactoEmergencia: { type: string }
        telefonoEmergencia: { type: string }
        nombreTutor: { type: string }
        dniTutor: { type: string }
    ConsultaCreate:
      type: object
      required: [pacienteId, motivo]
      properties:
        pacienteId: { type: string }
        motivo: { type: string }
        sintomas: { type: string }
        presionArterial: { type: string }
        temperatura:
          type: number
          format: float
          nullable: true
        frecuenciaCardiaca:
          type: integer
          nullable: true
        peso:
          type: number
          format: float
          nullable: true
        observaciones: { type: string }
        diagnosticos:
          type: array
          items:
            type: string
        tratamientos:
          type: array
          items:
            type: object
            required: [medicamento, dosis, frecuencia, duracion]
            properties:
              medicamento: { type: string }
              dosis: { type: string }
              frecuencia: { type: string }
              duracion: { type: string }
              indicaciones: { type: string }
        colaboradores:
          type: array
          items:
            type: string
    Consulta:
      type: object
      properties:
        id: { type: string }
        pacienteId: { type: string }
        medicoId: { type: string }
        fecha:
          type: string
          format: date-time
        motivo: { type: string }
        sintomas: { type: string }
        presionArterial: { type: string }
        temperatura:
          type: number
          format: float
          nullable: true
        frecuenciaCardiaca:
          type: integer
          nullable: true
        peso:
          type: number
          format: float
          nullable: true
        observaciones: { type: string }
        diagnosticos:
          type: array
          items:
            type: object
        tratamientos:
          type: array
          items:
            type: object
        notasClinicas:
          type: array
          items:
            type: object
        colaboradores:
          type: array
          items:
            type: object
        adjuntos:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
    NotaCreate:
      type: object
      required: [contenido]
      properties:
        contenido: { type: string }
    AttachmentCreateResponse:
      type: object
      properties:
        id: { type: string }
        creadoEn:
          type: string
          format: date-time
    Attachment:
      type: object
      properties:
        id: { type: string }
        nombre: { type: string }
        mimeType: { type: string }
        size:
          type: integer
        creadoEn:
          type: string
          format: date-time
    Auditoria:
      type: object
      properties:
        id: { type: string }
        accion: { type: string }
        detalles: { type: string }
        usuarioId: { type: string }
        ipAddress: { type: string }
        fecha:
          type: string
          format: date-time
    CitaCreate:
      type: object
      required: [pacienteId, medicoId, fechaHora]
      properties:
        pacienteId: { type: string }
        medicoId: { type: string }
        fechaHora:
          type: string
          format: date-time
        duracion: { type: integer }
        tipo: { type: string }
        estado:
          type: string
          enum: [pendiente, confirmada, cancelada, completada]
        notas: { type: string }
    CitaUpdate:
      type: object
      properties:
        fechaHora:
          type: string
          format: date-time
        duracion: { type: integer }
        tipo: { type: string }
        estado:
          type: string
          enum: [pendiente, confirmada, cancelada, completada]
        notas: { type: string }
    Cita:
      type: object
      properties:
        id: { type: string }
        pacienteId: { type: string }
        medicoId: { type: string }
        fechaHora:
          type: string
          format: date-time
        duracion:
          type: integer
          nullable: true
        tipo:
          type: string
          nullable: true
        estado:
          type: string
          enum: [pendiente, confirmada, cancelada, completada]
        notas:
          type: string
          nullable: true
        creadoEn:
          type: string
          format: date-time
